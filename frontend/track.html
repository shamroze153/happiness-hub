<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Order — Happiness Hub</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<canvas id="particles"></canvas>

<!-- ============================== NAV ============================== -->
<nav class="topnav">
  <div class="topnav__inner">
    <a href="index.html" class="topnav__brand">
      <div class="topnav__logo">💰</div>
      <span>Happiness Hub</span>
    </a>
    <div class="topnav__links">
      <a href="index.html">Home</a>
      <a href="track.html" class="active">Track Order</a>
      <a href="my-orders.html">My Orders</a>
    </div>
    <div class="topnav__actions">
      <a href="my-orders.html" class="btn-ghost btn-sm">My Orders</a>
      <button class="topnav__menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    </div>
  </div>
  <div class="topnav__mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="track.html" class="active">Track Order</a>
    <a href="my-orders.html">My Orders</a>
    <a href="agent-login.html">Agent Login</a>
    <a href="admin/login.html">Admin Login</a>
  </div>
</nav>

<section class="hero" style="padding-bottom:40px;">
  <div class="hero__orb hero__orb--1"></div>
  <div class="hero__orb hero__orb--2"></div>
  <div class="container hero__content">
    <div class="eyebrow" style="justify-content:center;">Self-serve status check</div>
    <h1 class="gradient-text">Track Your Order</h1>
    <p>Enter your email or Order ID below — no account or password needed.</p>
  </div>
</section>

<section class="section" style="padding-top:0;">
  <div class="container" style="max-width:640px;">
    <div class="card-glow slide-up">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="emailInput" class="form-control" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="text-center text-muted" style="font-size:12px; margin: -6px 0 12px;">— or —</div>
      <div class="form-group">
        <label class="form-label">Order ID</label>
        <input type="text" id="orderIdInput" class="form-control" placeholder="e.g. ORD-XXXXXXXX">
      </div>
      <button class="btn-primary btn-block" id="trackBtn">Track Order</button>
    </div>

    <div id="resultsArea" class="mt-24"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 Happiness Hub · Buyer-friendly cashback, zero hassle.</p>
  </div>
</footer>

<script src="lib/hh.js"></script>
<script>
const resultsArea = document.getElementById('resultsArea');
const emailInput = document.getElementById('emailInput');
const orderIdInput = document.getElementById('orderIdInput');
const trackBtn = document.getElementById('trackBtn');

async function trackOrder() {
  const email = emailInput.value.trim();
  const orderId = orderIdInput.value.trim();

  if (!email && !orderId) {
    HH.toast('Enter your email or Order ID to continue.', 'error');
    return;
  }

  trackBtn.disabled = true;
  trackBtn.innerHTML = '<span class="btn-spinner"></span> Searching…';
  resultsArea.innerHTML = '';

  const params = {};
  if (orderId) params.order_id = orderId;
  else params.email = email;

  const result = await HH.get('trackOrder', params);

  trackBtn.disabled = false;
  trackBtn.textContent = 'Track Order';

  if (!result.success) {
    resultsArea.innerHTML = `<div class="err-box slide-up"><span class="err-box__icon">⚠️</span><span>${HH.esc(result.error || 'No order found.')}</span></div>`;
    return;
  }

  if (!result.orders || !result.orders.length) {
    resultsArea.innerHTML = `<div class="empty-state slide-up">
      <div class="empty-state__icon">📭</div>
      <div class="empty-state__title">No orders found</div>
      <div class="empty-state__text">Double-check your email or Order ID and try again.</div>
    </div>`;
    return;
  }

  resultsArea.innerHTML = `<div class="flex-col gap-16">${result.orders.map(function (o) { return HH.renderOrderCard(o); }).join('')}</div>`;
  HH.staggerChildren(resultsArea.firstElementChild, 0, 80);
}

trackBtn.addEventListener('click', trackOrder);
emailInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') trackOrder(); });
orderIdInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') trackOrder(); });

document.getElementById('menuBtn').addEventListener('click', function () {
  document.getElementById('mobileMenu').classList.toggle('topnav__mobile-menu--open');
});

document.addEventListener('DOMContentLoaded', async function () {
  HH.mount();

  const settingsResult = await HH.get('getSettings');
  if (settingsResult.success && settingsResult.settings) {
    HH.setCurrencySymbol(settingsResult.settings.currency_symbol);
  }

  // Prefill from "Track This Order" CTA (?order_id=...) or returning visitor's email
  const params = new URLSearchParams(location.search);
  const orderIdParam = params.get('order_id');
  const savedEmail = localStorage.getItem('hh_buyer_email');

  if (orderIdParam) {
    orderIdInput.value = orderIdParam;
    trackOrder();
  } else if (savedEmail) {
    emailInput.value = savedEmail;
  }
});
</script>
</body>
</html>
