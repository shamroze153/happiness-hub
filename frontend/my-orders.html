<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — Happiness Hub</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<canvas id="particles"></canvas>

<nav class="topnav">
  <div class="topnav__inner">
    <a href="index.html" class="topnav__brand">
      <div class="topnav__logo">💰</div>
      <span>Happiness Hub</span>
    </a>
    <div class="topnav__links">
      <a href="index.html">Home</a>
      <a href="track.html">Track Order</a>
      <a href="my-orders.html" class="active">My Orders</a>
    </div>
    <div class="topnav__actions">
      <button class="btn-ghost btn-sm" id="switchEmailBtn">Switch Email</button>
      <button class="topnav__menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    </div>
  </div>
  <div class="topnav__mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="track.html">Track Order</a>
    <a href="my-orders.html" class="active">My Orders</a>
    <a href="agent-login.html">Agent Login</a>
    <a href="admin/login.html">Admin Login</a>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="page-header">
      <div>
        <h1>My Orders</h1>
        <p id="welcomeText">Loading your orders…</p>
      </div>
    </div>

    <div class="grid-stats mb-24" id="statCards">
      <div class="stat-card"><div class="skeleton" style="height:34px;"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:34px;"></div></div>
      <div class="stat-card"><div class="skeleton" style="height:34px;"></div></div>
    </div>

    <div id="needsProofBanner"></div>

    <div class="card mb-16">
      <div class="flex gap-12 flex-wrap items-center">
        <input type="search" id="searchInput" class="form-control" style="flex:1; min-width:180px;" placeholder="🔍 Search by product or order #…">
        <select id="statusFilter" class="form-control" style="max-width:190px;">
          <option value="">All Statuses</option>
          <option value="Pending">Pending</option>
          <option value="Ordered">Ordered</option>
          <option value="Delivered">Delivered</option>
          <option value="Cashback Sent">Cashback Sent</option>
          <option value="Rejected">Rejected</option>
          <option value="Need More Info">Need More Info</option>
          <option value="PayPal Issue">PayPal Issue</option>
        </select>
        <select id="needsActionFilter" class="form-control" style="max-width:200px;">
          <option value="">All Orders</option>
          <option value="needs_proof">📸 Needs Delivery Photo</option>
        </select>
      </div>
    </div>

    <div id="resultCount" class="text-muted mb-8" style="font-size:12.5px;"></div>

    <div id="ordersList">
      <div class="loading-row"><span class="btn-spinner"></span> Loading orders…</div>
    </div>
  </div>
</section>

<!-- ============================== ORDER DETAIL MODAL ============================== -->
<div class="modal-overlay" id="detailModalOverlay">
  <div class="modal modal--lg">
    <div class="modal__header">
      <div class="modal__title">Order Details</div>
      <button class="modal__close" id="closeDetailModalBtn" aria-label="Close">✕</button>
    </div>
    <div class="modal__body" id="detailModalBody"></div>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><p>© 2026 Happiness Hub · Buyer-friendly cashback, zero hassle.</p></div>
</footer>

<script src="lib/hh.js"></script>
<script>
let buyerEmail = '';
let ordersCache = [];
let currentSearch = '';
let currentStatusFilter = '';
let currentNeedsActionFilter = '';
let activeOrderId = null;

function needsDeliveryProof(order) {
  const status = String(order.status).trim();
  return (status === 'Pending' || status === 'Ordered') && !String(order.delivery_screenshot_url || '').trim();
}

// ---------------------------------------------------------------- stats / banner
function renderStats(stats) {
  document.getElementById('statCards').innerHTML = `
    <div class="stat-card">
      <div class="stat-card__label">📦 Total Orders</div>
      <div class="stat-card__value">${stats.total}</div>
    </div>
    <div class="stat-card stat-card--warn">
      <div class="stat-card__label">⏳ In Progress</div>
      <div class="stat-card__value">${stats.in_progress}</div>
    </div>
    <div class="stat-card stat-card--accent">
      <div class="stat-card__label">💸 Cashback Received</div>
      <div class="stat-card__value">${stats.cashback_received}</div>
    </div>`;
  HH.staggerChildren(document.getElementById('statCards'), 0, 70);
}

function renderNeedsProofBanner(count) {
  const el = document.getElementById('needsProofBanner');
  if (!count) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="action-banner slide-up">
    <div class="action-banner__icon">📸</div>
    <div class="action-banner__body">
      <div class="action-banner__title">${count} order${count > 1 ? 's' : ''} need${count > 1 ? '' : 's'} a delivery photo</div>
      <div class="action-banner__text">Use the "Needs Delivery Photo" filter below, open each order, and upload a photo — that's how we know to send your cashback.</div>
    </div>
  </div>`;
}

// ---------------------------------------------------------------- compact list
function applyFiltersAndRender() {
  let filtered = ordersCache;

  if (currentStatusFilter) {
    filtered = filtered.filter(function (o) { return String(o.status).trim() === currentStatusFilter; });
  }
  if (currentNeedsActionFilter === 'needs_proof') {
    filtered = filtered.filter(needsDeliveryProof);
  }
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(function (o) {
      return [o.product_title, o.order_id, o.order_number].some(function (f) {
        return String(f || '').toLowerCase().indexOf(q) !== -1;
      });
    });
  }

  document.getElementById('resultCount').textContent =
    filtered.length + (filtered.length === 1 ? ' order' : ' orders') +
    (filtered.length !== ordersCache.length ? ' (filtered from ' + ordersCache.length + ')' : '');

  renderOrderList(filtered);
}

function renderOrderList(orders) {
  const container = document.getElementById('ordersList');

  if (!ordersCache.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">🛍️</div>
      <div class="empty-state__title">No orders yet</div>
      <div class="empty-state__text">Once you submit your first order, it'll show up here.</div>
      <a href="index.html" class="btn-primary mt-16" style="display:inline-flex;">Browse Deals</a>
    </div>`;
    return;
  }

  if (!orders.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state__icon">🔎</div>
      <div class="empty-state__title">No orders match</div>
      <div class="empty-state__text">Try a different search term or filter.</div>
    </div>`;
    return;
  }

  const rowsHtml = orders.map(function (o) {
    const badge = HH.statusBadge(o.status);
    const flagged = needsDeliveryProof(o);
    return `<div class="order-row" data-order-id="${HH.esc(o.order_id)}">
      <div class="order-row__main">
        <div class="order-row__title">${flagged ? '<span class="order-row__flag" style="display:inline-block; margin-right:6px;"></span>' : ''}${HH.esc(o.product_title || 'Order')}</div>
        <div class="order-row__meta">#${HH.esc(o.order_id)}${o.order_number ? ' · Order# ' + HH.esc(o.order_number) : ''}</div>
      </div>
      <div class="order-row__date">${HH.esc(HH.timeAgo(o.submitted_at))}</div>
      <div class="order-row__amount">${HH.fmt$(o.cashback_amount)}</div>
      <span class="badge ${badge.className}">${badge.icon} ${HH.esc(badge.label)}</span>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="order-list slide-up">${rowsHtml}</div>`;

  container.querySelectorAll('.order-row').forEach(function (row) {
    row.addEventListener('click', function () { openDetailModal(row.dataset.orderId); });
  });
}

document.getElementById('searchInput').addEventListener('input', function (e) {
  currentSearch = e.target.value.trim();
  applyFiltersAndRender();
});
document.getElementById('statusFilter').addEventListener('change', function (e) {
  currentStatusFilter = e.target.value;
  applyFiltersAndRender();
});
document.getElementById('needsActionFilter').addEventListener('change', function (e) {
  currentNeedsActionFilter = e.target.value;
  applyFiltersAndRender();
});

// ---------------------------------------------------------------- detail modal
function openDetailModal(orderId) {
  const order = ordersCache.find(function (o) { return o.order_id === orderId; });
  if (!order) return;
  activeOrderId = orderId;

  const flagged = needsDeliveryProof(order);
  let bannerHtml = '';
  if (flagged) {
    bannerHtml = `
      <div class="action-banner">
        <div class="action-banner__icon">📸</div>
        <div class="action-banner__body">
          <div class="action-banner__title">Action needed: Mark as Delivered</div>
          <div class="action-banner__text">Upload a photo of the delivered item to trigger your cashback review.</div>
        </div>
        <div class="action-banner__upload">
          <div class="upload-zone" id="modalUploadZone">
            <div class="upload-zone__icon">📦</div>
            <div class="upload-zone__text"><strong>Click to upload</strong> a delivery photo<br>PNG or JPG, up to 5MB</div>
            <input type="file" accept="image/*" id="modalFileInput">
          </div>
          <div id="modalUploadPreview"></div>
        </div>
      </div>`;
  }

  document.getElementById('detailModalBody').innerHTML = `
    <div class="order-detail__header">
      <span class="order-detail__id">#${HH.esc(order.order_id)} · ${HH.esc(HH.timeAgo(order.submitted_at))}</span>
    </div>
    ${HH.renderOrderCard(order, { bannerHtml: bannerHtml })}
  `;

  if (flagged) {
    const zone = document.getElementById('modalUploadZone');
    const input = document.getElementById('modalFileInput');
    zone.addEventListener('click', function () { input.click(); });
    zone.addEventListener('dragover', function (e) { e.preventDefault(); zone.classList.add('upload-zone--drag'); });
    zone.addEventListener('dragleave', function () { zone.classList.remove('upload-zone--drag'); });
    zone.addEventListener('drop', function (e) {
      e.preventDefault();
      zone.classList.remove('upload-zone--drag');
      if (e.dataTransfer.files && e.dataTransfer.files.length) handleDeliveryUpload(e.dataTransfer.files[0]);
    });
    input.addEventListener('change', function (e) {
      if (e.target.files && e.target.files.length) handleDeliveryUpload(e.target.files[0]);
    });
  }

  document.getElementById('detailModalOverlay').classList.add('modal-overlay--visible');
}

function closeDetailModal() {
  document.getElementById('detailModalOverlay').classList.remove('modal-overlay--visible');
  activeOrderId = null;
}

document.getElementById('closeDetailModalBtn').addEventListener('click', closeDetailModal);
document.getElementById('detailModalOverlay').addEventListener('click', function (e) {
  if (e.target === this) closeDetailModal();
});

async function handleDeliveryUpload(file) {
  if (!file.type || file.type.indexOf('image/') !== 0) {
    HH.toast('Please choose an image file.', 'error');
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    HH.toast('That file is too large — please choose one under 5MB.', 'error');
    return;
  }

  const previewEl = document.getElementById('modalUploadPreview');
  previewEl.innerHTML = `<div class="loading-row"><span class="btn-spinner"></span> Uploading…</div>`;

  const uploadResult = await HH.uploadFile(file);
  if (!uploadResult.success) {
    HH.toast(uploadResult.error || 'Upload failed. Please try again.', 'error');
    previewEl.innerHTML = '';
    return;
  }

  const result = await HH.post('submitDeliveryProof', {
    order_id: activeOrderId,
    delivery_screenshot_url: uploadResult.url
  });

  if (!result.success) {
    HH.toast(result.error || 'Could not save delivery proof. Please try again.', 'error');
    previewEl.innerHTML = '';
    return;
  }

  HH.toast('Delivery proof received — thanks!', 'success');
  closeDetailModal();
  await loadOrders();
}

// ---------------------------------------------------------------- load
async function loadOrders() {
  const result = await HH.get('getBuyerOrders', { email: buyerEmail });

  if (!result.success) {
    document.getElementById('ordersList').innerHTML = `<div class="err-box"><span class="err-box__icon">⚠️</span><span>${HH.esc(result.error || 'Could not load your orders.')}</span></div>`;
    return;
  }

  ordersCache = result.orders;
  document.getElementById('welcomeText').textContent =
    result.orders.length ? `Showing orders for ${buyerEmail}` : `No orders found yet for ${buyerEmail}`;

  renderStats(result.stats);
  renderNeedsProofBanner(result.stats.needs_delivery_proof);
  applyFiltersAndRender();
}

document.getElementById('switchEmailBtn').addEventListener('click', function () {
  localStorage.removeItem('hh_buyer_email');
  location.href = 'buyer-login.html';
});

document.getElementById('menuBtn').addEventListener('click', function () {
  document.getElementById('mobileMenu').classList.toggle('topnav__mobile-menu--open');
});

document.addEventListener('DOMContentLoaded', async function () {
  HH.mount();

  buyerEmail = localStorage.getItem('hh_buyer_email');
  if (!buyerEmail) {
    location.href = 'buyer-login.html';
    return;
  }

  const settingsResult = await HH.get('getSettings');
  if (settingsResult.success && settingsResult.settings) {
    HH.setCurrencySymbol(settingsResult.settings.currency_symbol);
  }

  loadOrders();
});
</script>
</body>
</html>
